<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber-Tulas — Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/toggle.css" />
</head>
<body>

  <button class="theme-toggle" id="themeToggle" aria-label="Change Theme">
    <span class="toggle-icon" id="toggleIcon">☀️</span>
  </button>

  <div class="auth-wrapper" id="authWrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <span class="logo-bracket">[</span>
        <span class="logo-text">CYBER<span class="logo-accent">·</span>TULAS</span>
        <span class="logo-bracket">]</span>
      </div>
      <div class="auth-sub">Secure Access Terminal</div>

      <div class="auth-tabs">
        <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Lоgin</button>
        <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Registration</button>
        <div class="tab-indicator" id="tabIndicator"></div>
      </div>

      <div class="auth-form" id="loginForm">
        <div class="input-group">
          <label class="input-label">Username</label>
          <input type="text" class="input-field" id="loginUsername" placeholder="Enter username..." />
        </div>
        <div class="input-group">
          <label class="input-label">Password</label>
          <input type="password" class="input-field" id="loginPassword" placeholder="••••••••" />
        </div>
        <div class="error-msg" id="loginError"></div>
        <button class="btn-primary" onclick="handleLogin()">
          <span>Enter</span>
          <span class="btn-arrow">→</span>
        </button>
      </div>

      
      <div class="auth-form hidden" id="registerForm">
        <div class="input-group">
          <label class="input-label">Username</label>
          <input type="text" class="input-field" id="regUsername" placeholder="Enter username..." />
        </div>
        <div class="input-group">
          <label class="input-label">Email</label>
          <input type="email" class="input-field" id="regEmail" placeholder="your@email.com" />
        </div>
        <div class="input-group">
          <label class="input-label">Password</label>
          <input type="password" class="input-field" id="regPassword" placeholder="••••••••" />
        </div>
        <div class="input-group">
          <label class="input-label">Confirm Password</label>
          <input type="password" class="input-field" id="regConfirm" placeholder="••••••••" />
        </div>
        <div class="error-msg" id="registerError"></div>
        <button class="btn-primary" onclick="handleRegister()">
          <span>Register</span>
          <span class="btn-arrow">→</span>
        </button>
      </div>

    </div>
  </div>

  <div class="dashboard hidden" id="dashboard">
    <link rel="stylesheet" href="css/dashboard.css" />

    <header class="dash-header">
      <nav class="dash-nav">
        <div class="nav-logo">
          <span class="logo-bracket">[</span>
          <span class="logo-text">CYBER<span class="logo-accent">·</span>TULAS</span>
          <span class="logo-bracket">]</span>
        </div>
        <div class="nav-links">
          <a href="#" class="nav-link active" onclick="navClick(this, 'home')">Home</a>
          <a href="#" class="nav-link" onclick="navClick(this, 'servers')">Servers</a>
          <a href="#" class="nav-link" onclick="navClick(this, 'about')">About Us</a>
        </div>
        <div class="nav-right">
          <span class="nav-user" id="navUsername"></span>
          <button class="btn-logout" onclick="handleLogout()">Logout</button>
        </div>
      </nav>
    </header>

    <main class="dash-main">

      <section class="welcome-section">
        <h1 class="welcome-title">Welcome, <span class="accent" id="welcomeName"></span></h1>
        <p class="welcome-sub">Choose a server to connect to or manage your configuration.</p>
      </section>

      <section class="servers-section">
        <div class="servers-header">
          <h2 class="servers-title">My Servers</h2>
          <button class="btn-add" onclick="openServerModal()">+ Add Server</button>
        </div>

        <div class="empty-state" id="emptyState">
          <div class="empty-icon">⚡</div>
          <p class="empty-text">No connected servers</p>
          <p class="empty-sub">Click «Add Server» to get started</p>
        </div>

        <div class="server-grid" id="serverGrid"></div>
      </section>
    </main>
  </div>

  <div class="modal-overlay hidden" id="serverModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Available Servers</h3>
        <button class="modal-close" onclick="closeServerModal()">✕</button>
      </div>
      <div class="modal-list" id="availableServersList"></div>
    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
</body>
</html>
